# Configuración del servidor
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Configuración de Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/maquimu_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/ddl,classpath:db/migration/dml
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

# JWT Configuration
jwt.secret=MaquiMuSecretKeyForJWTTokenGenerationAndValidation2024ChangeInProduction
jwt.expiration.ms=86400000

# Logging
logging.level.com.maquimu=DEBUG
logging.level.org.springframework.security=DEBUG

# ===== Configuracion de correo SMTP =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:maquimu.sistema@gmail.com}
spring.mail.password=${MAIL_PASSWORD:app-password-here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Desactivar health check de mail (evita error en dev sin SMTP real)
management.health.mail.enabled=false
