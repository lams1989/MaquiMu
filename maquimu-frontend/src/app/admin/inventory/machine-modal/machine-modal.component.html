<div class="modal fade show d-block" tabindex="-1" role="dialog" aria-labelledby="machineModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="machineModalLabel">{{ isEditMode ? 'Editar Maquinaria' : 'Nueva Maquinaria' }}</h5>
                <button type="button" class="btn-close" aria-label="Close" (click)="cancel()"></button>
            </div>
            <div class="modal-body">
                <form [formGroup]="machineForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombreEquipo" class="form-label">Nombre del Equipo</label>
                            <input type="text" id="nombreEquipo" formControlName="nombreEquipo" class="form-control"
                                   [class.is-invalid]="machineForm.get('nombreEquipo')?.invalid && machineForm.get('nombreEquipo')?.touched">
                            <div *ngIf="machineForm.get('nombreEquipo')?.invalid && machineForm.get('nombreEquipo')?.touched" class="invalid-feedback">
                                El nombre del equipo es requerido.
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="marca" class="form-label">Marca</label>
                            <input type="text" id="marca" formControlName="marca" class="form-control"
                                   [class.is-invalid]="machineForm.get('marca')?.invalid && machineForm.get('marca')?.touched">
                            <div *ngIf="machineForm.get('marca')?.invalid && machineForm.get('marca')?.touched" class="invalid-feedback">
                                La marca es requerida.
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="modelo" class="form-label">Modelo</label>
                            <input type="text" id="modelo" formControlName="modelo" class="form-control"
                                   [class.is-invalid]="machineForm.get('modelo')?.invalid && machineForm.get('modelo')?.touched">
                            <div *ngIf="machineForm.get('modelo')?.invalid && machineForm.get('modelo')?.touched" class="invalid-feedback">
                                El modelo es requerido.
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="serial" class="form-label">Serial</label>
                            <input type="text" id="serial" formControlName="serial" class="form-control"
                                   [class.is-invalid]="machineForm.get('serial')?.invalid && machineForm.get('serial')?.touched">
                            <div *ngIf="machineForm.get('serial')?.invalid && machineForm.get('serial')?.touched" class="invalid-feedback">
                                El serial es requerido.
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="tarifaPorDia" class="form-label">Tarifa por Día</label>
                            <input type="number" id="tarifaPorDia" formControlName="tarifaPorDia" class="form-control"
                                   [class.is-invalid]="machineForm.get('tarifaPorDia')?.invalid && machineForm.get('tarifaPorDia')?.touched">
                            <div *ngIf="machineForm.get('tarifaPorDia')?.invalid && machineForm.get('tarifaPorDia')?.touched" class="invalid-feedback">
                                La tarifa por día es requerida y debe ser mayor que cero.
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="tarifaPorHora" class="form-label">Tarifa por Hora</label>
                            <input type="number" id="tarifaPorHora" formControlName="tarifaPorHora" class="form-control"
                                   [class.is-invalid]="machineForm.get('tarifaPorHora')?.invalid && machineForm.get('tarifaPorHora')?.touched">
                            <div *ngIf="machineForm.get('tarifaPorHora')?.invalid && machineForm.get('tarifaPorHora')?.touched" class="invalid-feedback">
                                La tarifa por hora es requerida y debe ser mayor que cero.
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea id="descripcion" formControlName="descripcion" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3" *ngIf="isEditMode">
                        <label for="estado" class="form-label">Estado</label>
                        <select id="estado" formControlName="estado" class="form-select">
                            <option *ngFor="let estado of estadosMaquinaria" [value]="estado">{{ estado }}</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" (click)="cancel()">Cancelar</button>
                <button type="button" class="btn btn-primary" (click)="saveMachine()" [disabled]="machineForm.invalid">Guardar</button>
            </div>
        </div>
    </div>
</div>
