# Development Profile Configuration

# Database - Development
spring.datasource.url=jdbc:mysql://localhost:3306/maquimu_db_dev?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA - Development (more verbose logging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging - Development
logging.level.root=DEBUG
logging.level.com.maquimu.backend=TRACE
logging.level.org.springframework.security=DEBUG

# Security - Development (disable CSRF for testing)
# spring.security.enabled=false
