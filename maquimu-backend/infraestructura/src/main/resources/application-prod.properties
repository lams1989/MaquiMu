# ===== Perfil de Producción =====

# Configuración del servidor
server.port=${PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Configuración de Base de Datos (variables de entorno de Railway/Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/ddl,classpath:db/migration/dml
spring.flyway.baseline-on-migrate=true

# JWT Configuration (usar variable de entorno en producción)
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=${JWT_EXPIRATION:86400000}

# CORS - Orígenes permitidos (separados por coma)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://maquimu.onrender.com,https://maqui-mu.vercel.app/}

# Logging (menos verboso en producción)
logging.level.com.maquimu=INFO
logging.level.org.springframework.security=WARN

# ===== Configuracion de correo SMTP =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Desactivar health check de mail
management.health.mail.enabled=false
