<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MaquiMu - Registro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #F5F5F5; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Lato', sans-serif;}
        .form-card { max-width: 800px; width: 100%; border-radius: 15px; border: none; }
        .header-bg { background-color: #0D47A1; color: white; border-radius: 15px 15px 0 0; padding: 2rem; }
        .btn-save { background-color: #FF6F00; color: white; }
    </style>
</head>
<body>

    <div class="card form-card shadow-lg">
        <div class="header-bg">
            <h3 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Registrar Nuevo Cliente</h3>
            <p class="mb-0 opacity-75">Ingrese los datos legales y de contacto.</p>
        </div>
        <div class="card-body p-5">
            <form class="row g-3 needs-validation" novalidate>
                <div class="col-12 mb-3">
                    <label class="form-label fw-bold">Tipo de Cliente</label>
                    <div class="d-flex gap-4">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="tipoCliente" id="juridica" checked>
                            <label class="form-check-label" for="juridica">Persona Jurídica (Empresa)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="tipoCliente" id="natural">
                            <label class="form-check-label" for="natural">Persona Natural</label>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="nombre" class="form-label">Razón Social / Nombre Completo <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nombre" required>
                </div>
                <div class="col-md-6">
                    <label for="nit" class="form-label">NIT / Cédula <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nit" placeholder="Sin puntos ni guiones" required>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Correo Electrónico <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" placeholder="facturacion@empresa.com" required>
                </div>
                <div class="col-md-6">
                    <label for="telefono" class="form-label">Teléfono / Celular <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" id="telefono" required>
                </div>

                <div class="col-12">
                    <label for="direccion" class="form-label">Dirección Física <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="direccion" placeholder="Calle, Carrera, Número..." required>
                </div>
                
                <div class="col-12 mt-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label" for="terms">
                            El cliente autoriza el tratamiento de datos personales.
                        </label>
                    </div>
                </div>

                <div class="col-12 mt-5 d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-light border">Cancelar</button>
                    <button type="submit" class="btn btn-save px-4">Guardar Cliente</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
