<div class="container-fluid">
    <div class="row mb-4">
        <div class="col">
            <h2><i class="bi bi-house-door me-2"></i>Bienvenido, {{ currentUser?.nombreCompleto || 'Cliente' }}</h2>
            <p class="text-muted">Este es tu portal personal en MaquiMu.</p>
        </div>
    </div>

    <!-- Accesos rápidos -->
    <div class="row g-4 mb-4">
        <div class="col-md-6 col-lg-4">
            <div class="card h-100 border-primary">
                <div class="card-body text-center">
                    <i class="bi bi-calendar-plus display-4 text-primary mb-3"></i>
                    <h5 class="card-title">Solicitar Alquiler</h5>
                    <p class="card-text text-muted">Reserva maquinaria para tus proyectos</p>
                    <a routerLink="/client/request-rental" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-2"></i>Nueva Solicitud
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-4">
            <div class="card h-100 border-info">
                <div class="card-body text-center">
                    <i class="bi bi-journal-text display-4 text-info mb-3"></i>
                    <h5 class="card-title">Mis Alquileres</h5>
                    <p class="card-text text-muted">Consulta el estado de tus alquileres</p>
                    <a routerLink="/client/my-rentals" class="btn btn-info text-white">
                        <i class="bi bi-list-ul me-2"></i>Ver Alquileres
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-4">
            <div class="card h-100 border-secondary">
                <div class="card-body text-center">
                    <i class="bi bi-receipt display-4 text-secondary mb-3"></i>
                    <h5 class="card-title">Mis Facturas</h5>
                    <p class="card-text text-muted">Revisa tus facturas y estados de pago</p>
                    <button class="btn btn-outline-secondary" disabled>
                        <i class="bi bi-clock me-2"></i>Próximamente
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
