<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaquiMu - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #0d46a1d8, #0D47A1);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5 text-center">
                        
                        <img src="mu.png" alt="Logo de MaquiMu" class="img-fluid w-50 mb-4">

                        <h2 class="card-title mb-4" style="color: #0D47A1; font-weight: 700;">Iniciar Sesión</h2>
                        
                        <form>
                            <div class="form-floating mb-3 text-start">
                                <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required>
                                <label for="email">Correo Electrónico</label>
                            </div>

                            <div class="form-floating mb-4 text-start">
                                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                                <label for="password">Contraseña</label>
                            </div>

                            <div class="d-grid">
                                <button class="btn btn-warning btn-lg fw-bold text-white" type="submit" style="background-color: #FF6F00;">Ingresar</button>
                            </div>
                        </form>

                        <div class="mt-4">
                            <a href="#" class="text-decoration-none text-muted">¿Olvidaste tu contraseña?</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
