# Configuración del servidor
server.port=8080

# Configuración de Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/maquimu_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

# JWT Configuration
jwt.secret=MaquiMuSecretKeyForJWTTokenGenerationAndValidation2024ChangeInProduction
jwt.expiration.ms=86400000

# Logging
logging.level.com.maquimu=DEBUG
logging.level.org.springframework.security=DEBUG
