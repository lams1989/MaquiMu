        password: ${jasyptpwd}
        algorithm: PBEWithMD5AndDES
        iv-generator-classname: org.jasypt.iv.NoIvGenerator

app:
    config:
        database:
            name: ENC(TF3KqcJhVBP7RmWjBIDlohEU6M+CyhY9hoQQq0Bfw6V+B0lSipDVuLTejJpl5n5dbvSYPxADY9Q=)
