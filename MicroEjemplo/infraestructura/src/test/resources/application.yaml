spring:
    datasource:
        driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
        type: com.zaxxer.hikari.HikariDataSource
        hikari:
            poolName: pool-pruebas-integracion-control-acceso
            schema: controlAcceso
    flyway:
        schemas: controlAcceso
        locations: classpath:pruebasintegracion/db/migration
    main:
        allow-bean-definition-overriding: true

infinispan:
  embedded:
    enabled: true

resilience4j:
    circuitbreaker:
        configs:
            default:
                slidingWindowType: TIME_BASED
                slidingWindowSize: 120000
                minimumNumberOfCalls: 10
                permittedNumberOfCallsInHalfOpenState: 5
                waitDurationInOpenState: 10000
                failureRateThreshold: 50
                registerHealthIndicator: true
                slowCallDurationThreshold: 2000
        instances:
            circuitoEnviarmensajesColaDeSalida:
                baseConfig: default
    retry:
        configs:
            default:
                maxAttempts: 2
                waitDuration: 5000

microservicio:
    api_controlacceso: http://localhost:8088/control-acceso/v1
    ambiente: PRB
    api-casoanalisis: http://localhost:8084/caso-analisis/v1

