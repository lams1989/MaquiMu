<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaquiMu - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #0D47A1;
            --accent-color: #FF6F00;
            --text-dark: #424242;
            --bg-light: #F5F5F5;
        }
        body {
            background-color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Lato', sans-serif;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .btn-login {
            background-color: var(--accent-color);
            border: none;
            padding: 12px 0;
            font-size: 1.1em;
            font-weight: bold;
        }
        .btn-login:hover {
            background-color: #e65100;
        }
    </style>
</head>
<body>
    <div class="card login-card p-4">
        <div class="card-body text-center">
            <img src="mu.png" alt="Logo de MaquiMu" class="img-fluid w-50 mb-4">
            <h4 class="mb-4 text-primary fw-bold">Bienvenido a MaquiMu</h4>
            <form>
                <div class="mb-3 text-start">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="tu@email.com" required>
                    </div>
                </div>
                <div class="mb-4 text-start">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="********" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-login w-100 mb-3">Ingresar</button>
                <a href="#" class="text-decoration-none text-muted">¿Olvidaste tu contraseña?</a>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Lógica de autenticación (simulada)
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (email === 'admin@maquimu.com' && password === 'admin') {
                alert('Login de Administrador exitoso!');
                window.location.href = 'admin-dashboard-view.html'; // Redirigir al dashboard admin
            } else if (email === 'cliente@maquimu.com' && password === 'cliente') {
                alert('Login de Cliente exitoso!');
                window.location.href = 'client-dashboard-view.html'; // Redirigir al dashboard cliente
            } else {
                alert('Credenciales incorrectas. Intenta de nuevo.');
            }
        });
    </script>
</body>
</html>
