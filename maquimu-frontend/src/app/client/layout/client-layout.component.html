<!-- Header -->
<nav class="navbar client-header px-4 py-2">
    <a routerLink="/client/portal" class="navbar-brand d-flex align-items-center text-white text-decoration-none">
        <img src="assets/images/mu.png" alt="MaquiMu" height="36" class="me-2">
        <span class="fw-semibold fs-5">MaquiMu</span>
        <span class="badge bg-info ms-2" style="font-size: 0.65rem; letter-spacing: 0.5px;">CLIENTE</span>
    </a>
    <div class="d-flex align-items-center">
        <!-- Mobile menu button (solo cuando hay sidebar) -->
        <button *ngIf="showSidebar" class="btn btn-outline-light btn-sm d-md-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#clientSidebarMobile">
            <i class="bi bi-list"></i>
        </button>
        <button class="btn btn-outline-light btn-sm" (click)="logout()" title="Cerrar Sesión">
            <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
    </div>
</nav>

<div class="d-flex">
    <!-- Sidebar Cliente (oculto en portal/dashboard) -->
    <div *ngIf="showSidebar" class="sidebar d-none d-md-block text-white" style="width: 250px;">
        <nav class="mt-3">
            <a routerLink="/client/portal" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
                <i class="bi bi-house-door me-2"></i>Inicio
            </a>
            <a routerLink="/client/request-rental" routerLinkActive="active">
                <i class="bi bi-calendar-plus me-2"></i>Solicitar Alquiler
            </a>
            <a routerLink="/client/my-rentals" routerLinkActive="active">
                <i class="bi bi-journal-text me-2"></i>Mis Alquileres
            </a>
            <a routerLink="/client/my-invoices" routerLinkActive="active">
                <i class="bi bi-receipt me-2"></i>Mis Facturas
            </a>
        </nav>
    </div>

    <!-- Contenido dinámico -->
    <main class="flex-grow-1 p-4">
        <router-outlet></router-outlet>
    </main>
</div>

<!-- Offcanvas sidebar para móvil -->
<div class="offcanvas offcanvas-start text-white" tabindex="-1" id="clientSidebarMobile">
    <div class="offcanvas-header border-bottom border-secondary">
        <h5 class="offcanvas-title">
            <img src="assets/images/mu.png" alt="MaquiMu" height="28" class="me-2">Portal Cliente
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
        <nav class="mt-3">
            <a routerLink="/client/portal" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" data-bs-dismiss="offcanvas">
                <i class="bi bi-house-door me-2"></i>Inicio
            </a>
            <a routerLink="/client/request-rental" routerLinkActive="active" data-bs-dismiss="offcanvas">
                <i class="bi bi-calendar-plus me-2"></i>Solicitar Alquiler
            </a>
            <a routerLink="/client/my-rentals" routerLinkActive="active" data-bs-dismiss="offcanvas">
                <i class="bi bi-journal-text me-2"></i>Mis Alquileres
            </a>
            <a routerLink="/client/my-invoices" routerLinkActive="active" data-bs-dismiss="offcanvas">
                <i class="bi bi-receipt me-2"></i>Mis Facturas
            </a>
        </nav>
    </div>
</div>
