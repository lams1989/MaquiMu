<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Inventario de Maquinaria</h2>
        <button class="btn btn-primary" (click)="openCreateModal()">
            <i class="bi bi-plus-lg"></i> Nueva Maquinaria
        </button>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Marca</th>
                            <th>Modelo</th>
                            <th>Serial</th>
                            <th>Estado</th>
                            <th>Tarifa Día</th>
                            <th>Tarifa Hora</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let m of maquinarias">
                            <td>{{ m.nombre }}</td>
                            <td>{{ m.marca }}</td>
                            <td>{{ m.modelo }}</td>
                            <td>{{ m.serial }}</td>
                            <td>
                                <span class="badge" [ngClass]="{
                        'text-bg-success': m.estado === 'DISPONIBLE',
                        'text-bg-warning': m.estado === 'MANTENIMIENTO',
                        'text-bg-danger': m.estado === 'ALQUILADO'
                      }">
                                    {{ m.estado }}
                                </span>
                            </td>
                            <td>{{ m.tarifaDia | currency }}</td>
                            <td>{{ m.tarifaHora | currency }}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary me-2" (click)="openEditModal(m)">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" (click)="deleteMaquinaria(m.id!)">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                        <tr *ngIf="maquinarias.length === 0">
                            <td colspan="8" class="text-center">No hay maquinaria registrada.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<app-machine-modal (save)="onModalSave()"></app-machine-modal>
