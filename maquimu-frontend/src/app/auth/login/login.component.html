<div class="login-container">
  <div class="login-decoration"></div>
  <div class="card login-card">
    <div class="card-body p-5 text-center">
      <div class="logo-wrapper mb-4">
        <img src="assets/images/mu.png" alt="Logo de MaquiMu" class="login-logo">
      </div>
      <h3 class="fw-bold mb-1" style="color: var(--text-dark);">Bienvenido</h3>
      <p class="text-muted mb-4">Ingresa a tu cuenta de MaquiMu</p>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-3 text-start">
          <label for="email" class="form-label">Correo Electrónico</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" formControlName="email" placeholder="tu@email.com"
                   [ngClass]="{ 'is-invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched }">
          </div>
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-danger small mt-1">
            <div *ngIf="loginForm.get('email')?.errors?.['required']">El email es requerido.</div>
            <div *ngIf="loginForm.get('email')?.errors?.['email']">El email no es válido.</div>
          </div>
        </div>

        <div class="mb-4 text-start">
          <label for="password" class="form-label">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" formControlName="password" placeholder="••••••••"
                   [ngClass]="{ 'is-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched }">
          </div>
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-danger small mt-1">
            <div *ngIf="loginForm.get('password')?.errors?.['required']">La contraseña es requerida.</div>
          </div>
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger py-2 mb-3">{{ errorMessage }}</div>

        <button type="submit" class="btn btn-login w-100 mb-3" [disabled]="loginForm.invalid || isLoading">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          {{ isLoading ? 'Iniciando...' : 'Ingresar' }}
          <i *ngIf="!isLoading" class="bi bi-arrow-right ms-2"></i>
        </button>
        <p class="register-link mt-3 mb-0">¿No tienes cuenta? <a routerLink="/auth/register" class="text-decoration-none fw-semibold register-accent">Regístrate aquí</a></p>
      </form>
    </div>
  </div>
</div>
