<div class="modal fade show d-block" tabindex="-1" role="dialog" aria-labelledby="clientModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="clientModalLabel">{{ isEditMode ? 'Editar Cliente' : 'Nuevo Cliente' }}</h5>
                <button type="button" class="btn-close" aria-label="Close" (click)="cancel()"></button>
            </div>
            <div class="modal-body">
                <form [formGroup]="clientForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombreCliente" class="form-label">Nombre del Cliente</label>
                            <input type="text" id="nombreCliente" formControlName="nombreCliente" class="form-control"
                                   [class.is-invalid]="clientForm.get('nombreCliente')?.invalid && clientForm.get('nombreCliente')?.touched">
                            <div *ngIf="clientForm.get('nombreCliente')?.invalid && clientForm.get('nombreCliente')?.touched" class="invalid-feedback">
                                El nombre del cliente es requerido.
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="identificacion" class="form-label">Identificación</label>
                            <input type="text" id="identificacion" formControlName="identificacion" class="form-control"
                                   [class.is-invalid]="clientForm.get('identificacion')?.invalid && clientForm.get('identificacion')?.touched">
                            <div *ngIf="clientForm.get('identificacion')?.invalid && clientForm.get('identificacion')?.touched" class="invalid-feedback">
                                La identificación es requerida.
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="telefono" class="form-label">Teléfono <span class="text-muted">(opcional)</span></label>
                            <input type="text" id="telefono" formControlName="telefono" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" id="email" formControlName="email" class="form-control"
                                   [class.is-invalid]="clientForm.get('email')?.invalid && clientForm.get('email')?.touched">
                            <div *ngIf="clientForm.get('email')?.errors?.['required'] && clientForm.get('email')?.touched" class="invalid-feedback">
                                El correo electrónico es requerido.
                            </div>
                            <div *ngIf="clientForm.get('email')?.errors?.['email'] && clientForm.get('email')?.touched" class="invalid-feedback">
                                Por favor ingrese un correo electrónico válido.
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="direccion" class="form-label">Dirección</label>
                        <textarea id="direccion" formControlName="direccion" class="form-control" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" (click)="cancel()">Cancelar</button>
                <button type="button" class="btn btn-primary" (click)="saveClient()" [disabled]="clientForm.invalid">Guardar</button>
            </div>
        </div>
    </div>
</div>
