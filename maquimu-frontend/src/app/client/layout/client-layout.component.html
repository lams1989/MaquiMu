<div class="d-flex">
    <!-- Sidebar Cliente -->
    <div class="sidebar d-none d-md-block bg-dark text-white" style="width: 250px;">
        <div class="p-3 text-center border-bottom border-secondary">
            <img src="assets/images/mu.png" alt="Logo MaquiMu" class="img-fluid w-75 mb-2">
            <small class="d-block text-white opacity-75">Portal Cliente</small>
        </div>
        <nav class="mt-3">
            <a routerLink="/client/portal" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
                <i class="bi bi-house-door me-2"></i>Inicio
            </a>
            <a routerLink="/client/request-rental" routerLinkActive="active">
                <i class="bi bi-calendar-plus me-2"></i>Solicitar Alquiler
            </a>
            <a routerLink="/client/my-rentals" routerLinkActive="active">
                <i class="bi bi-journal-text me-2"></i>Mis Alquileres
            </a>
            <a routerLink="/client/my-invoices" routerLinkActive="active">
                <i class="bi bi-receipt me-2"></i>Mis Facturas
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1">
        <!-- Navbar -->
        <nav class="navbar navbar-light bg-white shadow-sm px-4">
            <span class="navbar-brand mb-0 h1">
                <img src="assets/images/mu.png" alt="MaquiMu" height="32" class="me-2">
                Portal de Clientes
            </span>
            <div class="d-flex align-items-center">
                <!-- Mobile menu button -->
                <button class="btn btn-outline-dark d-md-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#clientSidebarMobile">
                    <i class="bi bi-list"></i>
                </button>
                <button class="btn btn-outline-danger btn-sm" (click)="logout()" title="Cerrar Sesión">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </button>
            </div>
        </nav>

        <!-- Contenido dinámico -->
        <main class="p-4">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>

<!-- Offcanvas sidebar para móvil -->
<div class="offcanvas offcanvas-start bg-dark text-white" tabindex="-1" id="clientSidebarMobile">
    <div class="offcanvas-header border-bottom border-secondary">
        <h5 class="offcanvas-title">
            <img src="assets/images/mu.png" alt="MaquiMu" height="28" class="me-2">Portal Cliente
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
        <nav class="mt-3">
            <a routerLink="/client/portal" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" data-bs-dismiss="offcanvas">
                <i class="bi bi-house-door me-2"></i>Inicio
            </a>
            <a routerLink="/client/request-rental" routerLinkActive="active" data-bs-dismiss="offcanvas">
                <i class="bi bi-calendar-plus me-2"></i>Solicitar Alquiler
            </a>
            <a routerLink="/client/my-rentals" routerLinkActive="active" data-bs-dismiss="offcanvas">
                <i class="bi bi-journal-text me-2"></i>Mis Alquileres
            </a>
            <a routerLink="/client/my-invoices" routerLinkActive="active" data-bs-dismiss="offcanvas">
                <i class="bi bi-receipt me-2"></i>Mis Facturas
            </a>
        </nav>
    </div>
</div>
